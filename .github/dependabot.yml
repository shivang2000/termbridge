version: 2

updates:
  # npm dependencies across the workspace packages.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Bundle minor/patch bumps so we get one reviewable PR, not a flood.
      minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions used by CI/release workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
